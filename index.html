<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter | daryan.</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
        
      <div class="input-container">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="text" id="num-el" />
        <button id="convert-btn">CONVERT</button>
      </div>
    </div>

    <div class="output-container">
        <div class="output-card">
            <h2>Length (Meter/Feet)</h2>
            <p id="length-el">0 meters = 0 feet | 0 feet = 0 meters</p>
        </div>
        <div class="output-card">
            <h2>Volume (Liters/Gallons)</h2>
            <p id="volume-el">0 liters = 0 gallons | 0 gallons = 0 liters</p>
        </div>
        <div class="output-card">
            <h2>Mass (Kilograms/Pounds)</h2>
            <p id="mass-el">0 kilos = 0 pounds | 0 pounds = 0 kilos</p>
        </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
